name: docs
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      # zensical builds the site; mkdocstrings-python renders the Python API
      # (it is not bundled with zensical). ghp-import pushes to gh-pages -- this
      # is what `mkdocs gh-deploy` did internally, so the Pages setup (deploy
      # from the gh-pages branch) keeps working unchanged.
      - run: pip install zensical mkdocstrings-python mkdocs-glightbox ghp-import
      - run: zensical build --clean
      - run: ghp-import --no-jekyll --push --force --message "docs: deploy ${{ github.sha }}" site
